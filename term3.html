<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SMART GRADE - Term 3</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SMART GRADE">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f3b48">
<link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="app-container">
    <div class="mobile-header"><button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button><div class="header-logo"><i class="fas fa-book-open"></i><span>TERM 3</span></div><div class="theme-btn-header" id="themeBtn"><i class="fas fa-palette"></i><span>Theme</span></div></div>
    <div class="sheet-overlay" id="sheetOverlay"></div>
    <div class="bottom-sheet" id="bottomSheet"><div class="bottom-sheet-header"><h3><i class="fas fa-brush"></i> Choose Theme</h3><button class="close-sheet" id="closeSheet"><i class="fas fa-times"></i></button></div><div class="bottom-sheet-content"><div class="theme-grid-rect" id="themeGrid"></div><div class="font-row-sheet"><div class="font-sheet" data-font="small">A<sup>-</sup> Small</div><div class="font-sheet" data-font="medium">A Medium</div><div class="font-sheet" data-font="large">A<sup>+</sup> Large</div></div></div></div>
    <div class="sidebar-menu" id="sidebarMenu"><div class="sidebar-header"><h3><i class="fas fa-graduation-cap"></i> MENU</h3><button class="close-sidebar" id="closeSidebar"><i class="fas fa-times"></i></button></div><nav class="sidebar-nav"><a href="dashboard.html" class="nav-item"><i class="fas fa-chalkboard-user"></i> Dashboard</a><a href="term1.html" class="nav-item"><i class="fas fa-1"></i> Term 1</a><a href="term2.html" class="nav-item"><i class="fas fa-2"></i> Term 2</a><a href="term3.html" class="nav-item active"><i class="fas fa-3"></i> Term 3</a><a href="yearly.html" class="nav-item"><i class="fas fa-chart-line"></i> Yearly</a><a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></nav></div>
    <div class="overlay" id="overlay"></div>
    <main class="main-content">
      <div class="glass-card" style="text-align:center"><div class="stat-value" id="overallTerm3" style="font-size:2rem;">0.00</div><div class="stat-label">OVERALL TERM 3 AVERAGE</div></div>
      <div id="compMsg" style="display:none;"></div>
      <div class="glass-card"><div style="overflow-x:auto;"><table class="grades-table"><thead><tr><th>Subject</th><th>Seq 5</th><th>Seq 6</th><th>Term 3</th><th>Status</th></tr></thead><tbody id="tableBody"></tbody></table></div></div>
    </main>
  </div>
  <div id="toastContainer" class="toast-container"></div>
  <div class="install-prompt" id="installPrompt"><i class="fas fa-mobile-alt"></i><div class="install-prompt-text"><h4>Install SMART GRADE</h4><p>Add this app to your home screen</p></div><button onclick="installApp()">Install</button></div>
  <script src="js/utils.js"></script>
  <script src="js/database.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    var currentUser=null;
    function loadTerm3(){
      currentUser=requireAuth();if(!currentUser)return;
      var subs=getActiveSubjectsWithCoefficients(currentUser.id,3);
      var grades=getStudentGrades(currentUser.id);
      var tbody=document.getElementById('tableBody');
      var comp=getCompData(currentUser.id,3);
      var compSubjs=comp?comp.adjustments.map(function(a){return a.subjectId;}):[];
      var t=0,c=0;
      tbody.innerHTML=subs.map(function(s){
        var s5=grades.filter(function(g){return g.subjectId===s.id&&g.sequenceId===5;});
        var s6=grades.filter(function(g){return g.subjectId===s.id&&g.sequenceId===6;});
        var a5=s5.length?roundToTwo(s5.reduce(function(a,b){return a+b.value;},0)/s5.length):0;
        var a6=s6.length?roundToTwo(s6.reduce(function(a,b){return a+b.value;},0)/s6.length):0;
        var ta=roundToTwo((a5+a6)/2);
        if(ta>0){t+=ta;c++;}
        var st=getStatusText(ta),sc=getStatusColor(ta);
        var compNote='';
        if(comp&&compSubjs.indexOf(s.id)!==-1){
          var adj=comp.adjustment;
          compNote=' <small style="color:#e67e22;">(+'+(adj>=0?'+':'')+formatNumber(adj)+')</small>';
        }
        return'<tr><td><strong><i class="fas fa-book"></i> '+s.name+'</strong>'+compNote+'</td><td>'+formatNumber(a5)+'</td><td>'+formatNumber(a6)+'</td><td><strong>'+formatNumber(ta)+'</strong></td><td style="color:'+sc+';">'+st+'</td></tr>';
      }).join('');
      document.getElementById('overallTerm3').innerHTML=formatNumber(c>0?roundToTwo(t/c):0);
      var msg=document.getElementById('compMsg');
      if(comp){
        msg.style.display='block';msg.className='danger-alert';
        var rm=DEFAULT_SUBJECTS.find(function(x){return x.id===comp.removedSubjectId;});
        msg.innerHTML='<i class="fas fa-balance-scale"></i><div class="danger-alert-text"><strong>Compensation applied:</strong> '+(rm?rm.name:'Subject')+' removed. Avg '+formatNumber(comp.termAvgBefore)+' preserved. Each subject adjusted by '+(comp.adjustment>=0?'+':'')+formatNumber(comp.adjustment)+'.</div>';
      }else{msg.style.display='none';}
    }
    loadTerm3();initMobileMenu();initThemeSelector();window.logout=logout;
  </script>
</body>
</html>
