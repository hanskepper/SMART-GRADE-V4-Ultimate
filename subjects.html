<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SMART GRADE - Subjects</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SMART GRADE">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f3b48">
<link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
  <div class="particles" id="particles"></div>
  
  <div class="app-container">
    <div class="mobile-header">
      <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
      <div class="header-logo">
        <i class="fas fa-book-open"></i>
        <span>SUBJECTS</span>
      </div>
      <div class="theme-btn-header" id="themeBtn">
        <i class="fas fa-palette"></i>
        <span>Theme</span>
      </div>
    </div>

    <div class="sheet-overlay" id="sheetOverlay"></div>
    <div class="bottom-sheet" id="bottomSheet">
      <div class="bottom-sheet-header">
        <h3><i class="fas fa-brush"></i> Choose Theme</h3>
        <button class="close-sheet" id="closeSheet"><i class="fas fa-times"></i></button>
      </div>
      <div class="bottom-sheet-content">
        <div class="theme-grid-rect" id="themeGrid"></div>
        <div class="font-row-sheet">
          <div class="font-sheet" data-font="small">A<sup>-</sup> Small</div>
          <div class="font-sheet" data-font="medium">A Medium</div>
          <div class="font-sheet" data-font="large">A<sup>+</sup> Large</div>
        </div>
      </div>
    </div>

    <div class="sidebar-menu" id="sidebarMenu">
      <div class="sidebar-header">
        <h3><i class="fas fa-graduation-cap"></i> MENU</h3>
        <button class="close-sidebar" id="closeSidebar"><i class="fas fa-times"></i></button>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-chalkboard-user"></i> Dashboard</a>
        <a href="subjects.html" class="nav-item active"><i class="fas fa-layer-group"></i> Subjects</a>
        <a href="add-grade.html" class="nav-item"><i class="fas fa-pen-fancy"></i> Add Grade</a>
        <a href="settings.html" class="nav-item"><i class="fas fa-sliders-h"></i> Settings</a>
        <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </nav>
    </div>
    <div class="overlay" id="overlay"></div>

    <main class="main-content">
      <div class="glass-card">
        <div class="term-tabs">
          <div class="term-tab active" data-term="1"><i class="fas fa-1"></i> Term 1</div>
          <div class="term-tab" data-term="2"><i class="fas fa-2"></i> Term 2</div>
          <div class="term-tab" data-term="3"><i class="fas fa-3"></i> Term 3</div>
        </div>

        <div class="stats-grid">
          <div class="stat-card"><div class="stat-value" id="totalSelected">0</div><div class="stat-label">SELECTED</div></div>
          <div class="stat-card"><div class="stat-value" id="totalGrades">0</div><div class="stat-label">GRADES</div></div>
          <div class="stat-card"><div class="stat-value" id="overallAvg">0.00</div><div class="stat-label">OVERALL</div></div>
          <div class="stat-card"><div class="stat-value" id="bestAvg">--</div><div class="stat-label">BEST</div></div>
        </div>
        
        <div id="subjectsList"></div>
      </div>
    </main>
  </div>

  <div id="toastContainer" class="toast-container"></div>
  
  <!-- PWA Install Prompt -->
<div class="install-prompt" id="installPrompt">
  <i class="fas fa-mobile-alt"></i>
  <div class="install-prompt-text">
    <h4>Install SMART GRADE</h4>
    <p>Add this app to your home screen for quick access</p>
  </div>
  <button onclick="installApp()">Install</button>
</div>

  <script src="js/utils.js"></script>
  <script src="js/database.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    var currentUser = null;
    var currentTerm = 1;

    function loadSubjects() {
      currentUser = requireAuth();
      if (!currentUser) return;

      var subjects = getActiveSubjectsWithCoefficients(currentUser.id, currentTerm);
      var grades = getStudentGrades(currentUser.id);

      document.getElementById('totalSelected').innerHTML = subjects.length;
      document.getElementById('totalGrades').innerHTML = grades.length;

      var overall = calculateStudentTermAverage(currentUser.id, currentTerm);
      document.getElementById('overallAvg').innerHTML = formatNumber(overall);

      var best = null, bestAvg = -1;
      var subjectsWithData = subjects.map(function(s) {
        var sg = grades.filter(function(g) { return g.subjectId === s.id; });
        var avg = sg.length ? roundToTwo(sg.reduce(function(a,b) { return a + b.value; }, 0) / sg.length) : 0;
        if (avg > bestAvg && avg > 0) { bestAvg = avg; best = s; }
        return { id: s.id, name: s.name, code: s.code, avg: avg, coeff: s.coefficient, isDanger: (avg > 0 && avg < 10) };
      });

      document.getElementById('bestAvg').innerHTML = best ? formatNumber(bestAvg, 1) : '--';

      document.getElementById('subjectsList').innerHTML = subjectsWithData.map(function(s) {
        return '<div class="subject-card" onclick="location.href=\'subject-detail.html?id=' + s.id + '\'" style="' + (s.isDanger ? 'border-left: 4px solid #dc3545;' : '') + '">' +
          '<div class="subject-info"><div class="subject-name"><i class="fas fa-book"></i> ' + s.name + '</div><div class="subject-meta">Coeff ' + s.coeff + '</div></div>' +
          '<div class="subject-avg">' + formatNumber(s.avg) + '</div>' +
          '</div>';
      }).join('');
    }

    document.querySelectorAll('.term-tab').forEach(function(tab, idx) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.term-tab').forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
        currentTerm = idx + 1;
        loadSubjects();
      });
    });

    loadSubjects();
    initMobileMenu();
    initThemeSelector();

    window.logout = logout;
  </script>
</body>
</html>
