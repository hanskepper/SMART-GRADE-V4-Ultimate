<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SMART GRADE - Page Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SMART GRADE">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f3b48">
<link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
  <div class="particles" id="particles"></div>
  
  <div class="app-container">
    <div class="mobile-header">
      <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
      <div class="header-logo">
        <i class="fas fa-book-open"></i>
        <span>ERROR</span>
      </div>
      <div class="theme-btn-header" id="themeBtn">
        <i class="fas fa-palette"></i>
        <span>Theme</span>
      </div>
    </div>

    <div class="sheet-overlay" id="sheetOverlay"></div>
    <div class="bottom-sheet" id="bottomSheet">
      <div class="bottom-sheet-header">
        <h3><i class="fas fa-brush"></i> Choose Theme</h3>
        <button class="close-sheet" id="closeSheet"><i class="fas fa-times"></i></button>
      </div>
      <div class="bottom-sheet-content">
        <div class="theme-grid-rect" id="themeGrid"></div>
        <div class="font-row-sheet">
          <div class="font-sheet" data-font="small">A<sup>-</sup> Small</div>
          <div class="font-sheet" data-font="medium">A Medium</div>
          <div class="font-sheet" data-font="large">A<sup>+</sup> Large</div>
        </div>
      </div>
    </div>

    <div class="sidebar-menu" id="sidebarMenu">
      <div class="sidebar-header">
        <h3><i class="fas fa-graduation-cap"></i> MENU</h3>
        <button class="close-sidebar" id="closeSidebar"><i class="fas fa-times"></i></button>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i> Home</a>
      </nav>
    </div>
    <div class="overlay" id="overlay"></div>

    <main class="main-content">
      <div class="glass-card" style="text-align:center">
        <i class="fas fa-exclamation-triangle" style="font-size: 60px; color: #e74c3c; margin-bottom: 10px;"></i>
        <h1 style="font-size: 5rem; font-weight:800; background:linear-gradient(135deg, #e74c3c, #e67e22); -webkit-background-clip:text; background-clip:text; color:transparent;">404</h1>
        <p style="font-size:1.1rem; font-weight:600; margin:10px 0;">Page Not Found</p>
        <p style="color:var(--text-light); font-size:0.8rem; margin-bottom:20px;">The page you're looking for doesn't exist.</p>
        <a href="index.html" class="btn btn-primary" style="display:inline-flex; width:auto; padding:12px 24px;"><i class="fas fa-home"></i> Go to Home</a>
      </div>
    </main>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <div class="install-prompt" id="installPrompt">
    <i class="fas fa-mobile-alt"></i>
    <div class="install-prompt-text">
      <h4>Install SMART GRADE</h4>
      <p>Add this app to your home screen for quick access</p>
    </div>
    <button onclick="installApp()">Install</button>
  </div>

  <!-- CHARGER database.js AVANT app.js -->
  <script src="js/utils.js"></script>
  <script src="js/database.js"></script>
  <script src="js/app.js"></script>
  <script>
    initParticles();
    initThemeSelector();
    initMobileMenu();
  </script>
</body>
</html>
