<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SMART GRADE - Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SMART GRADE">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f3b48">
<link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="app-container">
    <div class="mobile-header">
      <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
      <div class="header-logo"><i class="fas fa-book-open"></i><span>REGISTER</span></div>
      <div class="theme-btn-header" id="themeBtn"><i class="fas fa-palette"></i><span>Theme</span></div>
    </div>
    <div class="sheet-overlay" id="sheetOverlay"></div>
    <div class="bottom-sheet" id="bottomSheet">
      <div class="bottom-sheet-header"><h3><i class="fas fa-brush"></i> Choose Theme</h3><button class="close-sheet" id="closeSheet"><i class="fas fa-times"></i></button></div>
      <div class="bottom-sheet-content"><div class="theme-grid-rect" id="themeGrid"></div><div class="font-row-sheet"><div class="font-sheet" data-font="small">A<sup>-</sup> Small</div><div class="font-sheet" data-font="medium">A Medium</div><div class="font-sheet" data-font="large">A<sup>+</sup> Large</div></div></div>
    </div>
    <div class="sidebar-menu" id="sidebarMenu">
      <div class="sidebar-header"><h3><i class="fas fa-graduation-cap"></i> MENU</h3><button class="close-sidebar" id="closeSidebar"><i class="fas fa-times"></i></button></div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i> Home</a>
        <a href="login.html" class="nav-item"><i class="fas fa-sign-in-alt"></i> Login</a>
        <a href="register.html" class="nav-item active"><i class="fas fa-user-plus"></i> Register</a>
        <a href="guide.html" class="nav-item"><i class="fas fa-question-circle"></i> Guide</a>
      </nav>
    </div>
    <div class="overlay" id="overlay"></div>
    <main class="main-content">
      <div class="glass-card" style="text-align:center">
        <i class="fas fa-user-graduate" style="font-size:50px;color:var(--primary);margin-bottom:10px;"></i>
        <h2 style="background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;background-clip:text;color:transparent;">Create Account</h2>
        <p style="color:var(--text-light);">Join SMART GRADE</p>
      </div>
      <div class="glass-card">
        <div id="errorMsg" style="background:#fdeded;color:#e74c3c;padding:10px;border-radius:12px;margin-bottom:15px;display:none;"></div>
        <div id="successMsg" style="background:#d5f5e3;color:#27ae60;padding:10px;border-radius:12px;margin-bottom:15px;display:none;"></div>
        <div class="form-group"><label><i class="fas fa-user"></i> Full Name</label><input type="text" id="userName" placeholder="Enter your full name" class="form-input"></div>
        <div class="form-group">
          <label><i class="fas fa-school"></i> Class</label>
          <div style="display:flex;gap:12px;">
            <button type="button" id="classB1" style="flex:1;padding:10px;border-radius:12px;border:2px solid var(--border);background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;font-weight:600;cursor:pointer;">B1</button>
            <button type="button" id="classB2" style="flex:1;padding:10px;border-radius:12px;border:2px solid var(--border);background:transparent;color:var(--text);font-weight:600;cursor:pointer;">B2</button>
          </div>
          <input type="hidden" id="userClass" value="B1">
        </div>
        <div class="form-group"><label><i class="fas fa-hashtag"></i> Student Number</label><input type="number" id="userNumber" placeholder="Enter your number" class="form-input" min="1"></div>
        <div class="form-group"><label><i class="fas fa-lock"></i> Create PIN (4 digits)</label><input type="password" id="userPin" maxlength="4" placeholder="****" class="form-input" inputmode="numeric"></div>
        <div class="form-group"><label><i class="fas fa-check-circle"></i> Confirm PIN</label><input type="password" id="confirmPin" maxlength="4" placeholder="****" class="form-input" inputmode="numeric"></div>
        
        <div style="margin:20px 0;padding:16px;background:rgba(0,0,0,0.02);border-radius:16px;border:1px solid var(--border);text-align:center;">
          <p style="font-size:0.75rem;color:var(--text-light);margin-bottom:12px;"><i class="fas fa-fingerprint"></i> Add fingerprint now for quick login</p>
          <button class="btn btn-secondary" id="fpBtn" onclick="registerFP()" style="width:auto;display:inline-flex;"><i class="fas fa-fingerprint"></i> Register Fingerprint</button>
          <p id="fpStatus" style="font-size:0.65rem;margin-top:8px;color:var(--text-light);">No fingerprint registered yet</p>
        </div>
        
        <button class="btn btn-primary" onclick="handleRegister()"><i class="fas fa-user-plus"></i> Create Account</button>
        <div style="text-align:center;margin-top:16px;"><a href="login.html" style="color:var(--primary);font-size:0.8rem;">Already have an account? Login</a></div>
      </div>
    </main>
  </div>
  <div id="toastContainer" class="toast-container"></div>
  <div class="install-prompt" id="installPrompt"><i class="fas fa-mobile-alt"></i><div class="install-prompt-text"><h4>Install SMART GRADE</h4><p>Add this app to your home screen</p></div><button onclick="installApp()">Install</button></div>
  <script src="js/utils.js"></script>
  <script src="js/database.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    var selectedClass='B1';
    var fpDone=false;
    var tempId=null;

    document.getElementById('classB1').onclick=function(){selectedClass='B1';document.getElementById('classB1').style.background='linear-gradient(135deg,var(--primary),var(--secondary))';document.getElementById('classB1').style.color='white';document.getElementById('classB2').style.background='transparent';document.getElementById('classB2').style.color='var(--text)';document.getElementById('userClass').value='B1';};
    document.getElementById('classB2').onclick=function(){selectedClass='B2';document.getElementById('classB2').style.background='linear-gradient(135deg,var(--primary),var(--secondary))';document.getElementById('classB2').style.color='white';document.getElementById('classB1').style.background='transparent';document.getElementById('classB1').style.color='var(--text)';document.getElementById('userClass').value='B2';};

    function showError(m){var d=document.getElementById('errorMsg');d.innerHTML='<i class="fas fa-circle-exclamation"></i> '+m;d.style.display='block';document.getElementById('successMsg').style.display='none';setTimeout(function(){d.style.display='none';},4000);}
    function showSuccess(m){var d=document.getElementById('successMsg');d.innerHTML='<i class="fas fa-check-circle"></i> '+m;d.style.display='block';document.getElementById('errorMsg').style.display='none';}

    function handleRegister(){
      var name=document.getElementById('userName').value.trim();
      var number=parseInt(document.getElementById('userNumber').value);
      var pin=document.getElementById('userPin').value;
      var confirm=document.getElementById('confirmPin').value;
      if(!name){showError('Enter your full name');return;}
      if(isNaN(number)||number<1){showError('Enter a valid number');return;}
      if(!pin||pin.length!==4||!/^\d+$/.test(pin)){showError('PIN must be 4 digits');return;}
      if(pin!==confirm){showError('PINs do not match');return;}
      if(getUsedNumbersInClass(selectedClass).indexOf(number)!==-1){showError('Number '+number+' taken in '+selectedClass);return;}
      var r=createStudentAccount(name,number,selectedClass,pin);
      if(r.success){
        tempId=r.student.id;
        playActionFeedback();
        showSuccess('Account created!'+(fpDone?' Fingerprint linked!':'')+' Redirecting...');
        setTimeout(function(){location='login.html';},1500);
      }else{showError(r.message);}
    }

    function registerFP(){
      var name=document.getElementById('userName').value.trim();
      var number=parseInt(document.getElementById('userNumber').value);
      var pin=document.getElementById('userPin').value;
      var confirm=document.getElementById('confirmPin').value;
      if(!name||isNaN(number)||!pin||pin!==confirm||pin.length!==4){showError('Fill all fields correctly before registering fingerprint');return;}
      if(!tempId){
        if(getUsedNumbersInClass(selectedClass).indexOf(number)!==-1){showError('Number '+number+' taken in '+selectedClass);return;}
        var r=createStudentAccount(name,number,selectedClass,pin);
        if(!r.success){showError(r.message);return;}
        tempId=r.student.id;
      }
      var btn=document.getElementById('fpBtn');
      btn.innerHTML='<i class="fas fa-fingerprint"></i> Scanning...';
      btn.classList.add('authenticating');

      registerFingerprint(tempId,name,function(result){
        btn.classList.remove('authenticating');
        if(result.success){
          fpDone=true;
          btn.innerHTML='<i class="fas fa-check-circle"></i> Fingerprint Saved';
          document.getElementById('fpStatus').innerHTML='<i class="fas fa-check-circle" style="color:#27ae60;"></i> Fingerprint registered successfully!';
          showSuccess('Fingerprint saved! Now click Create Account.');
        }else{
          btn.innerHTML='<i class="fas fa-fingerprint"></i> Register Fingerprint';
          document.getElementById('fpStatus').innerHTML='<i class="fas fa-times-circle" style="color:#e74c3c;"></i> '+result.message;
        }
      });
    }

    initMobileMenu();
    initThemeSelector();
  </script>
</body>
</html>
