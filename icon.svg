<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3b48" />
      <stop offset="50%" style="stop-color:#006994" />
      <stop offset="100%" style="stop-color:#00b4d8" />
    </linearGradient>
    <linearGradient id="buildingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5c6e" />
      <stop offset="100%" style="stop-color:#0d3d4a" />
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a7a8a" />
      <stop offset="100%" style="stop-color:#0f5a6a" />
    </linearGradient>
    <linearGradient id="bookLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff" />
      <stop offset="100%" style="stop-color:#e8f4f8" />
    </linearGradient>
    <linearGradient id="bookRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff" />
      <stop offset="100%" style="stop-color:#e0f0f5" />
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71" />
      <stop offset="100%" style="stop-color:#27ae60" />
    </linearGradient>
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f39c12" />
      <stop offset="50%" style="stop-color:#f1c40f" />
      <stop offset="100%" style="stop-color:#f39c12" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.3" />
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fond principal -->
  <rect width="512" height="512" rx="90" fill="url(#bgGrad)" />
  
  <!-- Cercles décoratifs arrière-plan -->
  <circle cx="80" cy="80" r="40" fill="#ffffff" opacity="0.05" />
  <circle cx="440" cy="100" r="55" fill="#ffffff" opacity="0.04" />
  <circle cx="60" cy="400" r="35" fill="#ffffff" opacity="0.06" />
  <circle cx="460" cy="380" r="45" fill="#ffffff" opacity="0.05" />
  
  <!-- ============================================ -->
  <!-- BÂTIMENT ÉCOLE -->
  <!-- ============================================ -->
  <g filter="url(#shadow)">
    <!-- Corps du bâtiment -->
    <rect x="130" y="230" width="252" height="200" rx="14" fill="url(#buildingGrad)" stroke="#ffffff" stroke-width="3" />
    
    <!-- Ligne de séparation étages -->
    <line x1="130" y1="310" x2="382" y2="310" stroke="#ffffff" stroke-width="2" opacity="0.4" />
    
    <!-- Toit -->
    <polygon points="120,230 256,140 392,230" fill="url(#roofGrad)" stroke="#ffffff" stroke-width="3" />
    
    <!-- Drapeau sur le toit -->
    <line x1="256" y1="140" x2="256" y2="100" stroke="#ffffff" stroke-width="3" />
    <polygon points="256,100 300,115 256,130" fill="#e74c3c" />
    
    <!-- Portes d'entrée -->
    <rect x="225" y="340" width="30" height="90" rx="6" fill="#0a2a3a" stroke="#ffffff" stroke-width="2" />
    <rect x="257" y="340" width="30" height="90" rx="6" fill="#0a2a3a" stroke="#ffffff" stroke-width="2" />
    <!-- Poignées portes -->
    <circle cx="250" cy="390" r="3" fill="#f1c40f" />
    <circle cx="272" cy="390" r="3" fill="#f1c40f" />
    
    <!-- Fenêtres étage supérieur -->
    <rect x="150" y="250" width="40" height="40" rx="5" fill="#e0f7fa" stroke="#ffffff" stroke-width="2" />
    <rect x="210" y="250" width="40" height="40" rx="5" fill="#e0f7fa" stroke="#ffffff" stroke-width="2" />
    <rect x="262" y="250" width="40" height="40" rx="5" fill="#e0f7fa" stroke="#ffffff" stroke-width="2" />
    <rect x="322" y="250" width="40" height="40" rx="5" fill="#e0f7fa" stroke="#ffffff" stroke-width="2" />
    
    <!-- Croisillons fenêtres -->
    <line x1="170" y1="250" x2="170" y2="290" stroke="#0f3b48" stroke-width="1" opacity="0.5" />
    <line x1="150" y1="270" x2="190" y2="270" stroke="#0f3b48" stroke-width="1" opacity="0.5" />
    <line x1="230" y1="250" x2="230" y2="290" stroke="#0f3b48" stroke-width="1" opacity="0.5" />
    <line x1="210" y1="270" x2="250" y2="270" stroke="#0f3b48" stroke-width="1" opacity="0.5" />
    <line x1="282" y1="250" x2="282" y2="290" stroke="#0f3b48" stroke-width="1" opacity="0.5" />
    <line x1="262" y1="270" x2="302" y2="270" stroke="#0f3b48" stroke-width="1" opacity="0.5" />
    <line x1="342" y1="250" x2="342" y2="290" stroke="#0f3b48" stroke-width="1" opacity="0.5" />
    <line x1="322" y1="270" x2="362" y2="270" stroke="#0f3b48" stroke-width="1" opacity="0.5" />
    
    <!-- Fenêtres étage inférieur -->
    <rect x="150" y="340" width="40" height="40" rx="5" fill="#e0f7fa" stroke="#ffffff" stroke-width="2" />
    <rect x="322" y="340" width="40" height="40" rx="5" fill="#e0f7fa" stroke="#ffffff" stroke-width="2" />
    <line x1="170" y1="340" x2="170" y2="380" stroke="#0f3b48" stroke-width="1" opacity="0.5" />
    <line x1="150" y1="360" x2="190" y2="360" stroke="#0f3b48" stroke-width="1" opacity="0.5" />
    <line x1="342" y1="340" x2="342" y2="380" stroke="#0f3b48" stroke-width="1" opacity="0.5" />
    <line x1="322" y1="360" x2="362" y2="360" stroke="#0f3b48" stroke-width="1" opacity="0.5" />
  </g>
  
  <!-- ============================================ -->
  <!-- LIVRE OUVERT -->
  <!-- ============================================ -->
  <g transform="translate(256, 220)">
    <!-- Ombre du livre -->
    <ellipse cx="0" cy="55" rx="75" ry="10" fill="#000000" opacity="0.2" />
    
    <!-- Page arrière gauche -->
    <path d="M-5,0 C-35,-20 -80,-18 -100,5 L-100,55 C-80,35 -35,32 -5,48 Z" fill="#d5e8f0" stroke="#00ffff" stroke-width="1.5" />
    
    <!-- Page arrière droite -->
    <path d="M5,0 C35,-20 80,-18 100,5 L100,55 C80,35 35,32 5,48 Z" fill="#d5e8f0" stroke="#00ffff" stroke-width="1.5" />
    
    <!-- Page avant gauche -->
    <path d="M-5,0 C-35,-20 -80,-18 -100,5 L-100,55 C-80,35 -35,32 -5,48 Z" fill="url(#bookLeft)" stroke="#00b4d8" stroke-width="1.5" />
    
    <!-- Page avant droite -->
    <path d="M5,0 C35,-20 80,-18 100,5 L100,55 C80,35 35,32 5,48 Z" fill="url(#bookRight)" stroke="#00b4d8" stroke-width="1.5" />
    
    <!-- Lignes de texte page gauche -->
    <line x1="-85" y1="12" x2="-12" y2="8" stroke="#b0c4d0" stroke-width="2" stroke-linecap="round" />
    <line x1="-85" y1="20" x2="-12" y2="16" stroke="#b0c4d0" stroke-width="2" stroke-linecap="round" />
    <line x1="-85" y1="28" x2="-12" y2="24" stroke="#b0c4d0" stroke-width="2" stroke-linecap="round" />
    <line x1="-85" y1="36" x2="-12" y2="32" stroke="#b0c4d0" stroke-width="2" stroke-linecap="round" />
    <line x1="-85" y1="44" x2="-12" y2="40" stroke="#b0c4d0" stroke-width="1.5" stroke-linecap="round" />
    
    <!-- Lignes de texte page droite -->
    <line x1="12" y1="8" x2="85" y2="12" stroke="#b0c4d0" stroke-width="2" stroke-linecap="round" />
    <line x1="12" y1="16" x2="85" y2="20" stroke="#b0c4d0" stroke-width="2" stroke-linecap="round" />
    <line x1="12" y1="24" x2="85" y2="28" stroke="#b0c4d0" stroke-width="2" stroke-linecap="round" />
    <line x1="12" y1="32" x2="85" y2="36" stroke="#b0c4d0" stroke-width="2" stroke-linecap="round" />
    <line x1="12" y1="40" x2="85" y2="44" stroke="#b0c4d0" stroke-width="1.5" stroke-linecap="round" />
    
    <!-- Reliure centrale -->
    <line x1="0" y1="-3" x2="0" y2="48" stroke="#00ffff" stroke-width="3" filter="url(#glow)" />
    
    <!-- Marque-page -->
    <polygon points="0,15 -15,5 -15,35" fill="#e74c3c" opacity="0.8" />
  </g>
  
  <!-- ============================================ -->
  <!-- BADGE A+ -->
  <!-- ============================================ -->
  <g transform="translate(410, 160)" filter="url(#shadow)">
    <!-- Ruban -->
    <polygon points="-8,40 0,55 8,40" fill="url(#ribbonGrad)" />
    <polygon points="-8,40 -25,55 -15,45" fill="#e67e22" />
    <polygon points="8,40 25,55 15,45" fill="#e67e22" />
    
    <!-- Cercle badge -->
    <circle cx="0" cy="0" r="38" fill="url(#badgeGrad)" stroke="#ffffff" stroke-width="4" />
    <circle cx="0" cy="0" r="32" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5" />
    
    <!-- Texte A+ -->
    <text x="0" y="12" font-family="'Arial Black', Arial, sans-serif" font-size="36" font-weight="900" fill="#ffffff" text-anchor="middle">A+</text>
  </g>
  
  <!-- ============================================ -->
  <!-- TEXTE SMART GRADE -->
  <!-- ============================================ -->
  <g filter="url(#shadow)">
    <!-- Fond ruban texte -->
    <rect x="106" y="445" width="300" height="42" rx="21" fill="#000000" opacity="0.3" />
    
    <!-- Texte -->
    <text x="256" y="473" font-family="'Arial Black', 'Inter', Arial, sans-serif" font-size="28" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="5">SMART GRADE</text>
  </g>
  
  <!-- ============================================ -->
  <!-- ÉTOILES DÉCORATIVES -->
  <!-- ============================================ -->
  <g opacity="0.7">
    <circle cx="70" cy="130" r="2.5" fill="#ffffff" />
    <circle cx="95" cy="110" r="1.5" fill="#ffffff" opacity="0.5" />
    <circle cx="430" cy="80" r="2" fill="#ffffff" />
    <circle cx="450" cy="95" r="1.5" fill="#ffffff" opacity="0.6" />
    <circle cx="50" cy="300" r="2" fill="#ffffff" opacity="0.5" />
    <circle cx="470" cy="290" r="2" fill="#ffffff" opacity="0.4" />
    <circle cx="85" cy="350" r="1.5" fill="#ffffff" opacity="0.6" />
    <circle cx="440" cy="360" r="1.5" fill="#ffffff" opacity="0.5" />
  </g>
  
  <!-- ============================================ -->
  <!-- DIPLÔME EN BAS -->
  <!-- ============================================ -->
  <g transform="translate(90, 155)" opacity="0.9">
    <rect x="0" y="0" width="30" height="22" rx="2" fill="#ffffff" stroke="#f1c40f" stroke-width="1.5" transform="rotate(-15)" />
    <line x1="4" y1="6" x2="20" y2="6" stroke="#f1c40f" stroke-width="1" transform="rotate(-15)" />
    <line x1="4" y1="10" x2="16" y2="10" stroke="#f1c40f" stroke-width="1" transform="rotate(-15)" />
    <circle cx="15" cy="16" r="3" fill="#f1c40f" transform="rotate(-15)" />
  </g>
</svg>