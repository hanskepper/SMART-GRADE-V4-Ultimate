<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" height="100%">
    <defs>
        <!-- Dégradé Métallique Principal -->
        <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#E0FFFF" />
            <stop offset="20%" stop-color="#00FFFF" />
            <stop offset="50%" stop-color="#008080" />
            <stop offset="80%" stop-color="#004C4C" />
            <stop offset="100%" stop-color="#002222" />
        </linearGradient>

        <!-- Dégradé pour les reflets brillants "Glossy" -->
        <linearGradient id="glossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8" />
            <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.1" />
            <stop offset="100%" stop-color="#000000" stop-opacity="0.6" />
        </linearGradient>
        
        <!-- Dégradé Sombre pour les bases -->
        <linearGradient id="darkMetal" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#001A1A" />
            <stop offset="50%" stop-color="#004C4C" />
            <stop offset="100%" stop-color="#00B3B3" />
        </linearGradient>

        <!-- Dégradé pour le livre ouvert -->
        <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF" />
            <stop offset="50%" stop-color="#CCFFFF" />
            <stop offset="100%" stop-color="#008080" />
        </linearGradient>

        <!-- Filtre d'ombre portée profonde (3D) -->
        <filter id="shadow3D" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="8" dy="15" stdDeviation="10" flood-color="#000000" flood-opacity="0.7" />
        </filter>

        <!-- Filtre pour effet "Inner Shadow" (creux/bosse) -->
        <filter id="innerGlow">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadowDiff" />
            <feFlood flood-color="#00FFFF" flood-opacity="0.8" />
            <feComposite in2="shadowDiff" operator="in" />
            <feComposite in2="SourceGraphic" operator="over" />
        </filter>

        <!-- Filtre pour effet de lueur -->
        <filter id="glow">
            <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Arrière-plan -->
    <rect width="1000" height="1000" fill="#0A0A0A" />

    <!-- ==================== BOUCLIER CENTRAL (ARRIÈRE-PLAN 3D) ==================== -->
    <g filter="url(#shadow3D)">
        <!-- Corps du bouclier -->
        <path d="M 320 250 L 320 420 C 320 520 420 570 500 620 C 580 570 680 520 680 420 L 680 250 Z" fill="url(#metalGrad)" stroke="#00FFFF" stroke-width="6" />
        
        <!-- Bordure intérieure (effet de profondeur) -->
        <path d="M 335 265 L 335 415 C 335 505 425 550 500 595 C 575 550 665 505 665 415 L 665 265 Z" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.4" />
        <path d="M 335 265 L 335 415 C 335 505 425 550 500 595 C 575 550 665 505 665 415 L 665 265 Z" fill="none" stroke="#002222" stroke-width="8" opacity="0.5" />

        <!-- Reflet haut gauche du bouclier -->
        <path d="M 320 250 L 320 300 C 400 280 450 350 500 400 L 500 250 Z" fill="#FFFFFF" opacity="0.15" />
    </g>

    <!-- ==================== CHAPEAU DE DIPLÔME (HAUT 3D) ==================== -->
    <g filter="url(#shadow3D)">
        <!-- Base carrée du chapeau (Plateforme) -->
        <path d="M 320 170 L 500 110 L 680 170 L 500 215 Z" fill="url(#metalGrad)" stroke="#00FFFF" stroke-width="4" stroke-linejoin="round" />
        <!-- Effet de bord 3D sur la plateforme -->
        <path d="M 320 170 L 500 110 L 680 170 L 500 215 Z" fill="url(#glossGrad)" opacity="0.5" />
        
        <!-- Corps du chapeau (Cylindre) -->
        <path d="M 455 215 L 455 260 C 455 280 490 285 500 285 C 510 285 545 280 545 260 L 545 215 Z" fill="url(#darkMetal)" stroke="#00FFFF" stroke-width="3" />
        <!-- Reflet sur le cylindre -->
        <path d="M 460 220 L 460 260 C 460 270 480 275 485 275 L 485 220 Z" fill="#FFFFFF" opacity="0.2" />

        <!-- Pompon 3D -->
        <circle cx="630" cy="165" r="8" fill="#00FFFF" filter="url(#glow)" />
        <path d="M 630 165 L 630 230 L 615 255 L 645 255 L 630 230" fill="url(#metalGrad)" stroke="#00FFFF" stroke-width="2" />
        <path d="M 630 165 L 630 230 L 615 255 L 645 255 L 630 230" fill="url(#glossGrad)" opacity="0.5" />
        <line x1="630" y1="173" x2="630" y2="225" stroke="#FFFFFF" stroke-width="3" opacity="0.8" />
    </g>

    <!-- ==================== GRAPHIQUE (DANS LE BOUCLIER 3D) ==================== -->
    <g>
        <!-- Barres du graphique avec effet 3D -->
        <!-- Barre 1 -->
        <rect x="405" y="330" width="30" height="70" rx="5" fill="url(#metalGrad)" filter="url(#shadow3D)" />
        <rect x="405" y="330" width="15" height="70" rx="5" fill="#FFFFFF" opacity="0.3" /> <!-- Reflet -->
        
        <!-- Barre 2 -->
        <rect x="445" y="300" width="30" height="100" rx="5" fill="url(#metalGrad)" filter="url(#shadow3D)" />
        <rect x="445" y="300" width="15" height="100" rx="5" fill="#FFFFFF" opacity="0.3" />
        
        <!-- Barre 3 -->
        <rect x="485" y="270" width="30" height="130" rx="5" fill="url(#metalGrad)" filter="url(#shadow3D)" />
        <rect x="485" y="270" width="15" height="130" rx="5" fill="#FFFFFF" opacity="0.3" />
        
        <!-- Barre 4 -->
        <rect x="525" y="340" width="30" height="60" rx="5" fill="url(#metalGrad)" filter="url(#shadow3D)" />
        <rect x="525" y="340" width="15" height="60" rx="5" fill="#FFFFFF" opacity="0.3" />
        
        <!-- Barre 5 -->
        <rect x="565" y="360" width="30" height="40" rx="5" fill="url(#metalGrad)" filter="url(#shadow3D)" />
        <rect x="565" y="360" width="15" height="40" rx="5" fill="#FFFFFF" opacity="0.3" />

        <!-- Flèche de tendance 3D -->
        <path d="M 390 390 Q 450 350 510 300 L 590 240" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" filter="url(#shadow3D)" />
        <path d="M 390 390 Q 450 350 510 300 L 590 240" fill="none" stroke="#00FFFF" stroke-width="6" stroke-linecap="round" />
        <!-- Tête de flèche 3D -->
        <polygon points="590,240 560,255 570,230" fill="url(#metalGrad)" stroke="#00FFFF" stroke-width="2" filter="url(#shadow3D)" />
    </g>

    <!-- ==================== LIVRE OUVERT (CENTRE 3D) ==================== -->
    <g filter="url(#shadow3D)">
        <!-- Ombres sous le livre -->
        <ellipse cx="500" cy="495" rx="120" ry="25" fill="#000000" opacity="0.6" />

        <!-- Page Gauche avec effet de volume -->
        <path d="M 500 370 C 450 370 395 400 375 450 C 375 480 390 500 430 500 L 500 500 Z" fill="url(#bookGrad)" stroke="#004C4C" stroke-width="4" />
        <path d="M 500 370 C 450 370 395 400 375 450 C 375 480 390 500 430 500 L 500 500 Z" fill="url(#glossGrad)" opacity="0.3" />
        
        <!-- Page Droite avec effet de volume -->
        <path d="M 500 370 C 550 370 605 400 625 450 C 625 480 610 500 570 500 L 500 500 Z" fill="url(#bookGrad)" stroke="#004C4C" stroke-width="4" />
        <path d="M 500 370 C 550 370 605 400 625 450 C 625 480 610 500 570 500 L 500 500 Z" fill="url(#glossGrad)" opacity="0.3" />

        <!-- Reliure centrale (Effet creux) -->
        <path d="M 495 370 L 495 500 L 505 500 L 505 370 Z" fill="#002222" />
        <line x1="498" y1="370" x2="498" y2="500" stroke="#00FFFF" stroke-width="2" opacity="0.5" />
        <line x1="502" y1="370" x2="502" y2="500" stroke="#000000" stroke-width="2" />

        <!-- Lignes de texte 3D sur les pages -->
        <g opacity="0.8" stroke="#004C4C" stroke-width="4" stroke-linecap="round">
            <line x1="410" y1="420" x2="480" y2="420" />
            <line x1="400" y1="440" x2="485" y2="440" />
            <line x1="405" y1="460" x2="475" y2="460" />
            <line x1="520" y1="420" x2="590" y2="420" />
            <line x1="515" y1="440" x2="600" y2="440" />
            <line x1="525" y1="460" x2="595" y2="460" />
        </g>

        <!-- Texte SG avec effet 3D -->
        <text x="500" y="470" font-family="Arial Black, Impact, sans-serif" font-size="36" font-weight="900" fill="#00FFFF" text-anchor="middle" filter="url(#glow)">SG</text>
        <text x="500" y="470" font-family="Arial Black, Impact, sans-serif" font-size="36" font-weight="900" fill="none" stroke="#004C4C" stroke-width="4" text-anchor="middle">SG</text>
    </g>

    <!-- ==================== LIVRES EMPILÉS (GAUCHE 3D) ==================== -->
    <g filter="url(#shadow3D)">
        <!-- Livre 1 -->
        <rect x="175" y="450" width="85" height="30" rx="5" fill="url(#metalGrad)" stroke="#00FFFF" stroke-width="3" />
        <rect x="175" y="450" width="40" height="30" rx="5" fill="#FFFFFF" opacity="0.2" />
        <line x1="180" y1="460" x2="255" y2="460" stroke="#FFFFFF" stroke-width="2" opacity="0.8" />
        
        <!-- Livre 2 -->
        <rect x="180" y="420" width="80" height="30" rx="5" fill="url(#darkMetal)" stroke="#00FFFF" stroke-width="3" />
        <rect x="180" y="420" width="40" height="30" rx="5" fill="#FFFFFF" opacity="0.2" />
        <line x1="185" y1="430" x2="255" y2="430" stroke="#FFFFFF" stroke-width="2" opacity="0.8" />
        
        <!-- Livre 3 -->
        <rect x="170" y="390" width="90" height="30" rx="5" fill="url(#metalGrad)" stroke="#00FFFF" stroke-width="3" />
        <rect x="170" y="390" width="45" height="30" rx="5" fill="#FFFFFF" opacity="0.2" />
        <line x1="175" y1="400" x2="255" y2="400" stroke="#FFFFFF" stroke-width="2" opacity="0.8" />
    </g>

    <!-- ==================== POMME (GAUCHE HAUT 3D) ==================== -->
    <g filter="url(#shadow3D)">
        <!-- Corps de la pomme 3D -->
        <ellipse cx="230" cy="365" rx="40" ry="38" fill="url(#metalGrad)" />
        <ellipse cx="230" cy="365" rx="40" ry="38" fill="url(#glossGrad)" opacity="0.4" />
        <path d="M 200 350 C 200 315 230 310 230 330 C 230 310 260 315 260 350" fill="#FFFFFF" opacity="0.2" />
        
        <!-- Queue -->
        <path d="M 230 335 C 230 310 240 300 245 295" fill="none" stroke="#00FFFF" stroke-width="5" stroke-linecap="round" filter="url(#glow)" />
        
        <!-- Feuille 3D -->
        <path d="M 238 315 C 255 300 270 305 270 305 C 270 305 255 320 238 315 Z" fill="#00FFFF" stroke="#004C4C" stroke-width="2" filter="url(#glow)" />
        
        <!-- Reflet brillant -->
        <ellipse cx="215" cy="355" rx="10" ry="15" fill="#FFFFFF" opacity="0.6" transform="rotate(-30 215 355)" />
    </g>

    <!-- ==================== POT À CRAYONS (DROITE 3D) ==================== -->
    <g filter="url(#shadow3D)">
        <!-- Corps du pot -->
        <path d="M 680 380 L 680 480 C 680 500 785 500 785 480 L 785 380 Z" fill="url(#darkMetal)" stroke="#00FFFF" stroke-width="4" />
        <path d="M 680 380 L 680 480 C 680 500 785 500 785 480 L 785 380 Z" fill="url(#glossGrad)" opacity="0.3" />
        
        <!-- Bague haut du pot -->
        <rect x="675" y="370" width="115" height="20" rx="5" fill="url(#metalGrad)" stroke="#00FFFF" stroke-width="3" />
        <rect x="675" y="370" width="55" height="20" rx="5" fill="#FFFFFF" opacity="0.3" />
        
        <!-- Crayon 1 (Jaune 3D) -->
        <polygon points="705,370 715,290 725,370" fill="#FFD166" stroke="#004C4C" stroke-width="2" />
        <polygon points="715,290 718,270 721,290" fill="#00FFFF" /> <!-- Mine -->
        <polygon points="710,350 720,350 715,290" fill="#FFFFFF" opacity="0.4" />

        <!-- Crayon 2 (Vert 3D) -->
        <polygon points="730,370 740,300 750,370" fill="#06D6A0" stroke="#004C4C" stroke-width="2" />
        <polygon points="740,300 743,280 746,300" fill="#00FFFF" />
        <polygon points="735,350 745,350 740,300" fill="#FFFFFF" opacity="0.4" />

        <!-- Crayon 3 (Bleu 3D) -->
        <polygon points="755,370 765,270 775,370" fill="#118AB2" stroke="#004C4C" stroke-width="2" />
        <polygon points="765,270 768,250 771,270" fill="#00FFFF" />
        <polygon points="760,350 770,350 765,270" fill="#FFFFFF" opacity="0.4" />
    </g>

    <!-- ==================== BANNIÈRE TEXTE (CENTRE 3D) ==================== -->
    <g filter="url(#shadow3D)">
        <!-- Contour extérieur avec effet de coffre 3D -->
        <path d="M 160 490 L 160 555 C 160 570 180 580 210 580 L 240 580 L 255 610 L 745 610 L 760 580 L 790 580 C 820 580 840 570 840 555 L 840 490 Z" fill="url(#darkMetal)" stroke="#00FFFF" stroke-width="8" stroke-linejoin="round" />
        <path d="M 160 490 L 160 555 C 160 570 180 580 210 580 L 240 580 L 255 610 L 745 610 L 760 580 L 790 580 C 820 580 840 570 840 555 L 840 490 Z" fill="url(#glossGrad)" opacity="0.2" />
        
        <!-- Fond intérieur (Effet encastré) -->
        <path d="M 180 500 L 180 550 C 180 560 195 565 215 565 L 245 565 L 260 595 L 740 595 L 755 565 L 785 565 C 805 565 820 560 820 550 L 820 500 Z" fill="#0A2A2A" stroke="#00FFFF" stroke-width="4" stroke-linejoin="round" />
        
        <!-- Dégradé lumineux derrière le texte -->
        <path d="M 190 510 L 190 545 C 190 550 200 555 220 555 L 250 555 L 265 585 L 735 585 L 750 555 L 780 555 C 800 555 810 550 810 545 L 810 510 Z" fill="url(#metalGrad)" opacity="0.3" />

        <!-- Texte SMART GRADE 3D -->
        <!-- Ombre portée du texte -->
        <text x="500" y="560" font-family="Arial Black, Impact, sans-serif" font-size="75" font-weight="900" fill="#001A1A" text-anchor="middle" letter-spacing="5">SMART GRADE</text>
        
        <!-- Corps du texte (Dégradé métallique) -->
        <text x="500" y="558" font-family="Arial Black, Impact, sans-serif" font-size="75" font-weight="900" fill="url(#metalGrad)" text-anchor="middle" letter-spacing="5">SMART GRADE</text>
        
        <!-- Contour du texte -->
        <text x="500" y="558" font-family="Arial Black, Impact, sans-serif" font-size="75" font-weight="900" fill="none" stroke="#00FFFF" stroke-width="4" text-anchor="middle" letter-spacing="5">SMART GRADE</text>

        <!-- Reflet brillant sur le texte -->
        <text x="500" y="558" font-family="Arial Black, Impact, sans-serif" font-size="75" font-weight="900" fill="#FFFFFF" opacity="0.4" text-anchor="middle" letter-spacing="5" transform="translate(0, -15)">SMART GRADE</text>
    </g>

    <!-- ==================== CHAPEAU DE DIPLÔME (BAS 3D) ==================== -->
    <g filter="url(#shadow3D)">
        <!-- Base du chapeau -->
        <path d="M 410 640 L 500 595 L 590 640 L 500 675 Z" fill="url(#metalGrad)" stroke="#00FFFF" stroke-width="4" stroke-linejoin="round" />
        <path d="M 410 640 L 500 595 L 590 640 L 500 675 Z" fill="url(#glossGrad)" opacity="0.5" />
        
        <!-- Corps du chapeau -->
        <path d="M 460 675 L 460 705 C 460 720 490 725 500 725 C 510 725 540 720 540 705 L 540 675 Z" fill="url(#darkMetal)" stroke="#00FFFF" stroke-width="3" />
        <path d="M 465 680 L 465 705 C 465 715 480 718 485 718 L 485 680 Z" fill="#FFFFFF" opacity="0.2" />

        <!-- Pompon bas 3D -->
        <circle cx="550" cy="645" r="6" fill="#00FFFF" filter="url(#glow)" />
        <path d="M 550 645 L 550 690 L 545 705 L 555 705 L 550 690" fill="url(#metalGrad)" stroke="#00FFFF" stroke-width="2" />
        <path d="M 550 645 L 550 690 L 545 705 L 555 705 L 550 690" fill="url(#glossGrad)" opacity="0.5" />
    </g>

    <!-- ==================== LAURIERS / FEUILLES (BAS 3D) ==================== -->
    <g filter="url(#shadow3D)">
        <!-- Laurier Gauche -->
        <path d="M 340 620 C 300 590 260 620 250 660 C 270 645 310 645 340 670" fill="none" stroke="url(#metalGrad)" stroke-width="8" stroke-linecap="round" />
        <path d="M 340 650 C 310 630 280 640 270 670" fill="none" stroke="url(#metalGrad)" stroke-width="8" stroke-linecap="round" />
        <path d="M 360 675 C 335 655 310 670 300 695" fill="none" stroke="url(#metalGrad)" stroke-width="8" stroke-linecap="round" />
        <path d="M 375 700 C 355 685 340 700 335 720" fill="none" stroke="url(#metalGrad)" stroke-width="8" stroke-linecap="round" />
        <path d="M 400 725 C 380 710 365 725 360 745" fill="none" stroke="url(#metalGrad)" stroke-width="8" stroke-linecap="round" />
        <path d="M 435 750 C 415 735 400 750 395 770" fill="none" stroke="url(#metalGrad)" stroke-width="8" stroke-linecap="round" />

        <!-- Laurier Droite -->
        <path d="M 660 620 C 700 590 740 620 750 660 C 730 645 690 645 660 670" fill="none" stroke="url(#metalGrad)" stroke-width="8" stroke-linecap="round" />
        <path d="M 660 650 C 690 630 720 640 730 670" fill="none" stroke="url(#metalGrad)" stroke-width="8" stroke-linecap="round" />
        <path d="M 640 675 C 665 655 690 670 700 695" fill="none" stroke="url(#metalGrad)" stroke-width="8" stroke-linecap="round" />
        <path d="M 625 700 C 645 685 660 700 665 720" fill="none" stroke="url(#metalGrad)" stroke-width="8" stroke-linecap="round" />
        <path d="M 600 725 C 620 710 635 725 640 745" fill="none" stroke="url(#metalGrad)" stroke-width="8" stroke-linecap="round" />
        <path d="M 565 750 C 585 735 600 750 605 770" fill="none" stroke="url(#metalGrad)" stroke-width="8" stroke-linecap="round" />
    </g>

    <!-- ==================== BORDURE DE BOUCLIER EXTERNE (DÉCO 3D) ==================== -->
    <g>
        <path d="M 320 250 L 320 420 C 320 520 420 570 500 620 C 580 570 680 520 680 420 L 680 250" fill="none" stroke="#00FFFF" stroke-width="14" stroke-linecap="round" opacity="0.2" filter="url(#glow)" />
    </g>

</svg>
